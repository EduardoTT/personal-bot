<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            color: #111;
            overscroll-behavior: none;
        }

        .chat-wrapper {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
        }

        .message-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-bar {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 10px 12px;
            border-top: 1px solid #e0e0e0;
            background: #fff;
        }

        .input-bar textarea {
            flex: 1;
            resize: none;
            border: 1px solid #d0d0d0;
            border-radius: 20px;
            padding: 10px 14px;
            font-size: 16px;
            font-family: inherit;
            line-height: 1.4;
            max-height: 120px;
            overflow-y: auto;
            outline: none;
            background: #f5f5f5;
            color: #111;
        }

        .input-bar textarea:focus {
            border-color: #999;
            background: #fff;
        }

        .input-bar button {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #111;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-bar button:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .input-bar button:hover:not(:disabled) {
            background: #333;
        }

        .bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
        }

        .bubble.user {
            align-self: flex-end;
            background: #111;
            color: #fff;
            border-bottom-right-radius: 4px;
            transition: opacity 0.3s;
        }

        .bubble.user.pending {
            opacity: 0.4;
        }

        .bubble.bot {
            align-self: flex-start;
            background: #ececec;
            color: #111;
            border-bottom-left-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="message-list" id="message-list"></div>

        <form
            class="input-bar"
            hx-post="{% url 'message' %}"
            hx-target="#message-list"
            hx-swap="beforeend"
            hx-on::before-request="appendUserBubble(); this.reset(); document.getElementById('send-btn').disabled = true; document.getElementById('message-input').focus();"
        >
            {% csrf_token %}
            <textarea
                id="message-input"
                name="message"
                placeholder="Message"
                rows="1"
                autofocus
                onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); this.form.requestSubmit(); }"
                oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px'; document.getElementById('send-btn').disabled = !this.value.trim();"
            ></textarea>
            <button type="submit" id="send-btn" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
                </svg>
            </button>
        </form>
    </div>

    <script>
        function scrollToBottom() {
            const list = document.getElementById("message-list");
            list.scrollTop = list.scrollHeight;
        }

        function appendUserBubble() {
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            if (!text) return;
            const bubble = document.createElement("div");
            bubble.className = "bubble user pending";
            bubble.textContent = text;
            document.getElementById("message-list").appendChild(bubble);
            scrollToBottom();
        }

        document.addEventListener("htmx:afterSwap", function() {
            document.querySelectorAll(".bubble.user.pending").forEach(function(el) {
                el.classList.remove("pending");
            });
            scrollToBottom();
        });
    </script>
</body>
</html>

services:
    web:
        build: .
        container_name: django_web
        expose:
        - "8000"
        env_file:
        - .env
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - static_volume:/app/staticfiles
        restart: unless-stopped

    db:
        image: postgres:15
        container_name: postgres_db
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
        - postgres_data:/var/lib/postgresql/data
        env_file:
        - .env
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    nginx:
        image: nginx:1.27
        container_name: nginx
        ports:
        - "80:80"
        - "443:443"
        volumes:
        - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
        - static_volume:/static
        - /var/lib/tailscale/certs/${DOMAIN}.crt:/etc/nginx/certs/fullchain.pem:ro
        - /var/lib/tailscale/certs/${DOMAIN}.key:/etc/nginx/certs/privkey.pem:ro
        depends_on:
        - web
        restart: unless-stopped

volumes:
    postgres_data:
    static_volume:
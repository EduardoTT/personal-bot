version: "3.9"

services:
  web:
    build: .
    container_name: django_web
    ports:
      - "8000:8000"
    env_file:
      - /opt/personal_bot/.env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    env_file:
      - /opt/personal_bot/.env

volumes:
  postgres_data: